site_name: Autossential
site_url: https://github.com/Autossential

theme:
  name: material
  favicon: imgs/favicon.ico
  logo: imgs/logo.svg
  font:
    text: Roboto

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Version 4x:
    - About: index.md
    - Change Log: changelog.md
    - Activities:
      - Data:
        - Add Range To Collection: AddRangeToCollection.md
        - Data Table To Text: DataTableToText.md
        - Promote Headers: PromoteHeaders.md
        - Remove Data Columns: RemoveDataColumns.md
        - Remove Empty Rows: RemoveEmptyRows.md
        - Transpose Data: TransposeData.md
        - Update Dictionary: UpdateDictionary.md
      - Files:
        - Clean Up Folder: CleanUpFolder.md
        - Unzip: Unzip.md
        - Wait File: WaitFile.md
        - Zip: Zip.md
      - Programming:
        - Culture Scope: CultureScope.md
        - Increment/Decrement: IncrementDecrement.md
        - Load Data File: LoadDataFile.md
        - Merge Data: MergeData.md
        - Parse Data: ParseData.md
        - Random String: RandomString.md
        - Replace Tokens: ReplaceTokens.md
      - System:
        - Map Drive: MapDrive.md
        - Terminate Process: TerminateProcess.md
        - Unmap Drive: UnmapDrive.md
      - Workflow:
        - Check Point: CheckPoint.md
        - Container: Container.md
        - Exit: Exit.md
        - If Activity: IfActivity.md
        - Time Loop: TimeLoop.md
    - Models:
      - DataNode: models/DataNode.md
